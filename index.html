<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>n66144597李晟允25篇論文報告</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .slide-container { aspect-ratio: 3 / 1; }
        /* 帝國指令：全局強制覆寫為標楷體 */
        body {
            font-family: "BiauKai", "DFKai-SB", "標楷體", serif !important;
        }
    </style>
</head>
<body class="bg-black text-gray-100 h-screen w-screen flex items-center justify-center p-4 overflow-hidden">

    <div class="slide-container w-full max-w-[1600px] bg-gray-900 border border-gray-700 shadow-2xl overflow-hidden relative">
        
        <div id="cover-view" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-900 z-40 p-20 text-center transition-opacity duration-300">
            <h1 id="cover-title" class="text-[30px] font-bold text-blue-400 mb-12 leading-relaxed tracking-wide">載入中...</h1>
            <p id="cover-author" class="text-gray-400 tracking-widest text-[20px] uppercase"></p>
        </div>

        <div id="content-view" class="absolute inset-0 flex flex-col bg-gray-900 z-30 hidden transition-opacity duration-300">
            <main class="flex-1 min-h-0 grid grid-cols-2">
                
                <section class="p-10 pb-16 pt-12 border-r border-gray-700 flex flex-col justify-start overflow-hidden">
                    <h2 id="zone-title" class="text-[24px] font-semibold mb-6 border-l-4 border-blue-500 pl-4 text-white shrink-0">載入中...</h2>
                    <ul id="takeaways" class="space-y-6 text-[16px] leading-relaxed text-gray-300 list-disc pl-6">
                        </ul>
                </section>

                <section class="p-6 bg-gray-800/50 flex flex-col min-h-0 overflow-hidden relative">
                    <div id="visual-container" class="flex-1 min-h-0 w-full relative rounded-lg overflow-hidden flex items-center justify-center">
                        </div>
                </section>
            </main>
        </div>

        <div class="absolute bottom-8 left-10 z-50">
            <span id="page-indicator" class="text-gray-500 text-[16px] tracking-widest">1 / X</span>
        </div>
    </div>

    <script>
        let slideData = [];
        let currentIndex = 0; // 0 代表封面，1~N 代表內容頁
        let totalPages = 0;

        // 啟動引擎，讀取燃料 (JSON)
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                // 填充封面資料
                document.getElementById('cover-title').innerText = data.reportTitle;
                document.getElementById('cover-author').innerText = data.author;
                
                slideData = data.slides;
                totalPages = slideData.length + 1; // 總頁數 = 內容頁數 + 1(封面)
                
                renderSlide(currentIndex);
            })
            .catch(err => console.error("JSON 讀取失敗", err));

        // 渲染核心邏輯
        function renderSlide(index) {
            // 更新頁碼
            document.getElementById('page-indicator').innerText = `${index + 1} / ${totalPages}`;

            if (index === 0) {
                // 狀態 A：顯示封面，隱藏內容
                document.getElementById('cover-view').classList.remove('hidden');
                document.getElementById('content-view').classList.add('hidden');
            } else {
                // 狀態 B：隱藏封面，顯示內容
                document.getElementById('cover-view').classList.add('hidden');
                document.getElementById('content-view').classList.remove('hidden');

                // 提取對應的 JSON 資料 (注意：index 1 對應 slideData[0])
                const slide = slideData[index - 1];
                
                document.getElementById('zone-title').innerText = slide.zoneTitle;
                
                document.getElementById('takeaways').innerHTML = slide.bullets.map(b => 
                    `<li><span class="text-blue-300 font-bold">${b.split('：')[0]}</span>：${b.split('：')[1] || ''}</li>`
                ).join('');

                
                // --- 帝國升級模組：陣列視覺渲染引擎 ---
                const visualDiv = document.getElementById('visual-container');
                if (slide.visualType === 'image') {
                    // 判斷是否為陣列 (多張圖片)
                    if (Array.isArray(slide.visualContent)) {
                        visualDiv.innerHTML = `<div class="absolute inset-0 p-4 grid grid-rows-2 gap-6">` + 
                            slide.visualContent.map(img => `<div class="relative w-full h-full"><img src="${img}" class="absolute inset-0 w-full h-full object-contain drop-shadow-2xl"></div>`).join('') + 
                            `</div>`;
                    } else {
                        // 單張圖片維持霸權佈局
                        visualDiv.innerHTML = `<img src="${slide.visualContent}" class="absolute inset-0 w-full h-full object-contain drop-shadow-2xl">`;
                    }
                } else {
                    visualDiv.innerHTML = `<p class="text-[16px] leading-loose text-blue-200 p-8">${slide.visualContent}</p>`;
                }
            }
        }

        // 全局控制神經網路
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ' || e.key === 'PageDown') {
                e.preventDefault();
                if (currentIndex < totalPages - 1) { currentIndex++; renderSlide(currentIndex); }
            }
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') {
                e.preventDefault();
                if (currentIndex > 0) { currentIndex--; renderSlide(currentIndex); }
            }
        });

        document.querySelector('.slide-container').addEventListener('click', (e) => {
            if (e.clientX > window.innerWidth / 2) {
                if (currentIndex < totalPages - 1) { currentIndex++; renderSlide(currentIndex); }
            } else {
                if (currentIndex > 0) { currentIndex--; renderSlide(currentIndex); }
            }
        });
    </script>
</body>
</html>
